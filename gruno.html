<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#6f8f3e,#111);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.player{
width:360px;
text-align:center;
}

video{
width:100%;
border-radius:15px;
}

.title{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

.artist{
opacity:0.7;
margin-bottom:15px;
}

.controls{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}

button{
background:none;
border:none;
color:white;
font-size:30px;
cursor:pointer;
}

.play{
font-size:40px;
}

.progress{
width:100%;
height:5px;
background:#444;
border-radius:5px;
margin-top:15px;
}

.bar{
height:5px;
width:0%;
background:white;
border-radius:5px;
}
</style>
</head>

<body>

<div class="player">

<video id="video" src="https://mysiteonly.github.io/logo-siluman/brunomars.mp4"></video>

<div class="title">Die With A Smile</div>
<div class="artist">Lady Gaga & Bruno Mars</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="controls">
<button onclick="back()">⏮</button>
<button class="play" onclick="playPause()" id="play">▶</button>
<button onclick="forward()">⏭</button>
</div>

</div>

<script>

let video = document.getElementById("video");
let playBtn = document.getElementById("play");
let bar = document.getElementById("bar");

function playPause(){
if(video.paused){
video.play();
playBtn.innerHTML="⏸";
}else{
video.pause();
playBtn.innerHTML="▶";
}
}

video.addEventListener("timeupdate",()=>{
let percent = (video.currentTime / video.duration)*100;
bar.style.width = percent+"%";
});

function forward(){
video.currentTime +=10;
}

function back(){
video.currentTime -=10;
}

</script>

</body>
</html>
