<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/727/727245.png">
<title>Video Player</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(#6f8f3e,#111);
color:white;
height:100dvh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.player{
width:92vw;
max-width:320px;
text-align:center;
}

video{
width:100%;
max-height:50vh;
object-fit:contain;
border-radius:16px;
background:black;
}

.title{
margin-top:1.5vh;
font-size:2.2vh;
font-weight:bold;
}

.artist{
opacity:0.7;
font-size:1.6vh;
margin-top:0.5vh;
}

.progress{
width:100%;
height:0.6vh;
background:#444;
border-radius:10px;
margin-top:2vh;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:white;
will-change:width;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:4vw;
margin-top:2vh;
}

button{
background:none;
border:none;
color:white;
font-size:3vh;
}

.play{
font-size:4.5vh;
}

</style>
</head>

<body>

<div class="player">

<video controls playsinline preload="metadata">
<source src="https://mysiteonly.github.io/logo-siluman/brunomars.mp4" type="video/mp4">
</video>

<div class="title">Die With A Smile</div>
<div class="artist">Lady Gaga & Bruno Mars</div>

<div class="progress" onclick="seek(event)">
<div class="bar" id="bar"></div>
</div>

<div class="controls">
<button onclick="back()">⏮</button>
<button class="play" onclick="playPause()" id="play">▶</button>
<button onclick="forward()">⏭</button>
</div>

</div>

<script>

let video=document.getElementById("video");
let playBtn=document.getElementById("play");
let bar=document.getElementById("bar");

video.addEventListener("loadeddata",()=>{
    video.currentTime = 0.01;
});

function playPause(){
if(video.paused){
video.play();
playBtn.innerHTML="⏸";
}else{
video.pause();
playBtn.innerHTML="▶";
}
}

video.ontimeupdate = () => {
bar.style.width = (video.currentTime / video.duration * 100) + "%";
};

function forward(){
video.currentTime+=10;
}

function back(){
video.currentTime-=10;
}

function seek(e){
let progress=e.currentTarget;
let pos=e.offsetX/progress.offsetWidth;
video.currentTime=pos*video.duration;
}

</script>

</body>
</html>
