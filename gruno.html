<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/727/727245.png">

<title>Video Player</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(#6f8f3e,#111);
color:white;
height:100dvh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.player{
width:92vw;
max-width:320px;
text-align:center;
}

video{
width:100%;
max-height:50vh;
object-fit:contain;
border-radius:16px;
background:black;

/* video tidak bisa diklik */
pointer-events:none;
}

/* sembunyikan kontrol browser */
video::-webkit-media-controls{
display:none !important;
}

video::-webkit-media-controls-start-playback-button{
display:none !important;
}

.title{
margin-top:1.5vh;
font-size:2.2vh;
font-weight:bold;
}

.artist{
opacity:.7;
font-size:1.6vh;
margin-top:.5vh;
}

.progress{
width:100%;
height:.6vh;
background:#444;
border-radius:10px;
margin-top:2vh;
overflow:hidden;
cursor:pointer;
}

.bar{
height:100%;
width:0%;
background:white;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
margin-top:2vh;
}

button{
background:none;
border:none;
color:white;
font-size:4.5vh;
cursor:pointer;
}

</style>
</head>

<body>

<div class="player">

<video id="video" playsinline preload="metadata">
<source src="https://mysiteonly.github.io/logo-siluman/brunomars.mp4" type="video/mp4">
</video>

<div class="title">Die With A Smile</div>
<div class="artist">Lady Gaga & Bruno Mars</div>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<div class="controls">
<button id="play">▶</button>
</div>

</div>

<script>

const video=document.getElementById("video");
const playBtn=document.getElementById("play");
const bar=document.getElementById("bar");
const progress=document.getElementById("progress");

/* hilangkan overlay play browser */

video.addEventListener("loadedmetadata",()=>{
video.currentTime=0.01;
video.pause();
});

/* tombol play pause custom */

playBtn.addEventListener("click",()=>{

if(video.paused){

video.play();
playBtn.textContent="⏸";

}else{

video.pause();
playBtn.textContent="▶";

}

});

/* update progress */

video.addEventListener("timeupdate",()=>{

if(video.duration){

let percent=(video.currentTime/video.duration)*100;
bar.style.width=percent+"%";

}

});

/* klik progress untuk seek */

progress.addEventListener("click",(e)=>{

const rect=progress.getBoundingClientRect();
const pos=(e.clientX-rect.left)/rect.width;

video.currentTime=pos*video.duration;

});

</script>

</body>
</html>
