<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/727/727245.png">
<title>Video Player</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(#6f8f3e,#111);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.player{
width:100%;
max-width:420px;
padding:20px;
}

video{
width:100%;
border-radius:18px;
background:black;
}

.title{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.artist{
opacity:0.7;
font-size:15px;
margin-top:5px;
}

.time{
display:flex;
justify-content:space-between;
font-size:12px;
opacity:0.7;
margin-top:6px;
}

.progress{
width:100%;
height:6px;
background:#444;
border-radius:10px;
margin-top:10px;
overflow:hidden;
cursor:pointer;
}

.bar{
height:100%;
width:0%;
background:white;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:35px;
margin-top:25px;
}

button{
background:none;
border:none;
color:white;
font-size:30px;
}

.play{
font-size:50px;
}

button:active{
transform:scale(0.9);
}

</style>
</head>

<body>

<div class="player">

<video id="video" playsinline>
<source src="https://mysiteonly.github.io/logo-siluman/brunomars.mp4" type="video/mp4">
</video>

<div class="title">Die With A Smile</div>
<div class="artist">Lady Gaga & Bruno Mars</div>

<div class="progress" onclick="seek(event)">
<div class="bar" id="bar"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="controls">
<button onclick="back()">⏮</button>
<button class="play" onclick="playPause()" id="play">▶</button>
<button onclick="forward()">⏭</button>
</div>

</div>

<script>

let video = document.getElementById("video");
let playBtn = document.getElementById("play");
let bar = document.getElementById("bar");

let current = document.getElementById("current");
let duration = document.getElementById("duration");

function playPause(){

if(video.paused){
video.play();
playBtn.innerHTML="⏸";
}else{
video.pause();
playBtn.innerHTML="▶";
}

}

video.addEventListener("loadedmetadata",()=>{
duration.innerText = format(video.duration);
});

video.addEventListener("timeupdate",()=>{

let percent = (video.currentTime / video.duration)*100;
bar.style.width = percent+"%";

current.innerText = format(video.currentTime);

});

function forward(){
video.currentTime +=10;
}

function back(){
video.currentTime -=10;
}

function seek(e){

let progress = e.currentTarget;
let pos = e.offsetX / progress.offsetWidth;

video.currentTime = pos * video.duration;

}

function format(time){

let m = Math.floor(time/60);
let s = Math.floor(time%60);

if(s<10) s="0"+s;

return m+":"+s;

}

</script>

</body>
</html>
